[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
# Sourcing the ephemeral file must not fail the whole start (use || true on source).
# Health uses /api/health so checks do not wait on the home page (DB + RSC).
startCommand = "node init_db.js && sh -c 'set -a; ( [ -f /tmp/shop-oracle.env ] && . /tmp/shop-oracle.env ) || true; set +a; exec npm run start'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[deploy.environmentVariables]
# Railway template: add PLAYERINDEX_API_KEY as a required variable; shops paste the key from playerindexdata.com/claim.
# Both names are supported in code; set the same value if you override the host.
API_BASE_URL = "https://api.playerindexdata.com"
FINTECH_API_URL = "https://api.playerindexdata.com"
# S3 / Railway Bucket — same effect as Bucket → "Add to Service" in the dashboard.
# Requires a Bucket resource in this project whose service name is exactly "Bucket"
# (canvas name). If you rename it, change "Bucket" below to match (e.g. ${{MyBucket.BUCKET}}).
# See https://docs.railway.com/guides/storage-buckets#variable-references
AWS_ACCESS_KEY_ID = "${{Bucket.ACCESS_KEY_ID}}"
AWS_SECRET_ACCESS_KEY = "${{Bucket.SECRET_ACCESS_KEY}}"
AWS_S3_BUCKET_NAME = "${{Bucket.BUCKET}}"
AWS_REGION = "${{Bucket.REGION}}"
AWS_ENDPOINT_URL = "${{Bucket.ENDPOINT}}"
