# ──────────────────────────────────────────────────────────────────────────────
# Railway Configuration — card-app-prod
# Deployment source: ghcr.io/verdic-admin/card-app-prod:latest
# Railway pulls the pre-built Docker image from GHCR — no build step needed.
# Image Auto Updates must be enabled on the service for zero-touch fleet updates.
# ──────────────────────────────────────────────────────────────────────────────

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000

# Auto-generate a public *.up.railway.app domain for every deployment
[[service.networking]]
generateDomain = true
