[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "node init_db.js && npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

[deploy.environmentVariables]
API_BASE_URL = "https://api.playerindexdata.com"
ENABLE_STUB_ROUTERS = "1"
