name: Sync from Upstream Template

# Runs nightly to pull the latest code from the master card-app-prod template.
# Vercel auto-deploys on every push, so customers get new features overnight
# without any manual developer action.

on:
  schedule:
    - cron: '0 7 * * *'   # 2:00 AM EST / 7:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout customer repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Verdic-Admin/card-app-prod.git || true
          git fetch upstream main --no-tags

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream changes
        run: |
          git merge upstream/main \
            --no-edit \
            --allow-unrelated-histories \
            -X theirs \
            --message "chore: auto-sync from upstream template [skip ci]"

      - name: Push changes
        run: git push origin main
